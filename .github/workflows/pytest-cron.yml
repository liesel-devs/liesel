name: pytest-cron

on:
  schedule:
    - cron: '7 9 * * 2'  # Every Tuesday at 09:00 UTC
  workflow_dispatch: # trigger manually from GitHub UI

env:
  UV_SYSTEM_PYTHON: 1

jobs:
  pytest-cron:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        include:
          - python-version: "3.13"
            resolution: upgrade
            sync-args: "--upgrade --all-groups"
          - python-version: "3.13"
            resolution: lowest-direct
            sync-args: "--resolution lowest-direct --all-groups"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv and set the python version
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install liesel (${{ matrix.resolution }})
        run: uv sync ${{ matrix.sync-args }}

      - name: Run pytest
        run: uv run pytest --run-mcmc

      - name: Run doctests
        run: uv run pytest --doctest-modules src/liesel

  notify-failure:
    needs: pytest-cron
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Create failure issue
        run: |
          gh issue create \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_WORKFLOW failed" \
            --body-file - <<EOF
          The workflow **$GITHUB_WORKFLOW** failed.

          Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID
          Branch: $GITHUB_REF
          Commit: $GITHUB_SHA
          EOF
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
